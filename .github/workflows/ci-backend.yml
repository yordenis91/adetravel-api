name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Inspector de Backend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🗄️ Generar Cliente Prisma
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:5432/db?schema=public"  

      - name: 🔨 Construir TypeScript
        run: npm run build
      
      - name: 🚀 Notificar a EasyPanel (despliegue Backend)
        if: success()
        run: |
          curl -X POST "http://49.13.19.148:3000/api/deploy/0a99f97345d7eb0495fd0f597dc719ac9f485c4a4427ba7e"
